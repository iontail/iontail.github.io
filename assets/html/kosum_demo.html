<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Editing Guideline Demo</title>
<style>
  :root {
    --bg: #0f1116;
    --panel: #181b23;
    --panel-2: #1f2330;
    --border: #2a2f3d;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #6c8cff;
    --accent-soft: #2a356b;
    --green: #4ade80;
    --green-soft: #16331f;
    --amber: #fbbf24;
    --card: #20242f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Noto Sans KR", Roboto, sans-serif;
  }
  .app {
    display: grid;
    grid-template-columns: 440px 1fr;
    height: 100vh;
  }
  /* ---------- Left ---------- */
  .left {
    display: flex; flex-direction: column;
    background: var(--panel);
    border-right: 1px solid var(--border);
    min-height: 0;
  }
  .left-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--border);
  }
  .left-header h1 { font-size: 17px; margin: 0; font-weight: 650; }
  .left-header p { margin: 4px 0 0; font-size: 12.5px; color: var(--muted); }
  .left-body { flex: 1; overflow-y: auto; padding: 22px 24px 16px; }
  .field { margin-bottom: 26px; }
  .field-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: .04em;
  }
  .field-label .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    font-size: 11px; font-weight: 700;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 13px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel-2); color: var(--muted);
    font-size: 13px; cursor: pointer; user-select: none;
    transition: all .12s ease;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  textarea {
    width: 100%; resize: vertical; min-height: 96px;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text);
    font-size: 13.5px; line-height: 1.6; font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  #videoContext { min-height: 150px; }
  .left-footer { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--panel); }
  .submit-btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 650; cursor: pointer;
    transition: background .12s ease, transform .05s ease;
  }
  .submit-btn:hover { background: #5a7bff; }
  .submit-btn:active { transform: translateY(1px); }
  .submit-btn:disabled { opacity: .55; cursor: default; }

  /* ---------- Right ---------- */
  .right { display: flex; flex-direction: column; background: var(--bg); min-height: 0; }
  .right-header {
    padding: 20px 32px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .right-header h2 { font-size: 16px; margin: 0; font-weight: 650; }
  .badge { font-size: 12px; color: var(--green); display: none; align-items: center; gap: 6px; }
  .badge.show { display: inline-flex; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .right-body { flex: 1; overflow-y: auto; padding: 26px 32px 48px; }
  .placeholder {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 14px; text-align: center;
  }
  .placeholder svg { opacity: .35; }

  /* ---------- Result cards ---------- */
  .result { max-width: 820px; margin: 0 auto; }

  /* Top: category title */
  .res-title { margin-bottom: 22px; }
  .res-title h1 { font-size: 22px; margin: 0; font-weight: 700; }
  .res-title .cat {
    display: inline-block; margin-top: 8px;
    padding: 4px 12px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    font-size: 13px; font-weight: 600;
  }

  /* generic card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
  }
  .card > .card-title {
    display: flex; align-items: center; gap: 9px;
    font-size: 14.5px; font-weight: 700; margin-bottom: 13px;
  }
  .tick {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 6px; font-size: 12px; font-weight: 800;
  }
  .tick.g { background: var(--green-soft); color: var(--green); }
  .tick.b { background: var(--accent-soft); color: var(--accent); }

  /* highlight (summary) box */
  .highlight {
    background: linear-gradient(180deg, rgba(74,222,128,.07), rgba(74,222,128,.02));
    border: 1px solid #25503198; border-left: 3px solid var(--green);
  }
  .highlight .quote { font-size: 14.5px; line-height: 1.8; color: var(--text); }

  /* meta pills row */
  .meta-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .pill {
    display: inline-flex; align-items: baseline; gap: 7px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px; font-size: 13px;
  }
  .pill .k { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; }
  .pill .v { color: var(--text); font-weight: 600; }

  /* section group header */
  .group-head {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
    margin: 24px 0 12px; padding-left: 2px;
  }

  /* paragraph card */
  .para { font-size: 13.8px; line-height: 1.8; color: var(--text); }

  /* guide card with colored accent + labeled rows */
  .guide { border-left: 3px solid var(--accent); }
  .guide.visual { border-left-color: #6c8cff; }
  .guide.text   { border-left-color: #c084fc; }
  .guide.audio  { border-left-color: #fbbf24; }
  .guide-row { display: flex; gap: 12px; padding: 9px 0; border-top: 1px dashed var(--border); }
  .guide-row:first-of-type { border-top: none; padding-top: 2px; }
  .guide-row .label {
    flex: 0 0 78px; font-size: 12px; font-weight: 700; color: var(--muted);
    padding-top: 2px;
  }
  .guide-row.cond  .label { color: #8aa1ff; }
  .guide-row.act   .label { color: #d6def7; }
  .guide-row.why   .label { color: #7e8aa3; }
  .guide-row .val { flex: 1; font-size: 13.6px; line-height: 1.75; color: var(--text); }

  /* numbered priority list */
  .plist { list-style: none; margin: 0; padding: 0; counter-reset: p; }
  .plist li {
    display: flex; gap: 12px; padding: 10px 0;
    border-top: 1px dashed var(--border); font-size: 13.8px; line-height: 1.7;
  }
  .plist li:first-child { border-top: none; padding-top: 2px; }
  .plist li::before {
    counter-increment: p; content: counter(p);
    flex: 0 0 24px; height: 24px; border-radius: 7px;
    background: var(--accent-soft); color: var(--accent);
    font-size: 12px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
  }

  .fade-in { animation: fade .35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a2f3d; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #353b4d; }
</style>
</head>
<body>
<div class="app">
  <!-- ============ LEFT: INPUT ============ -->
  <section class="left">
    <div class="left-header">
      <h1>User Input</h1>
      <p>Category · Video Context · Editing Direction</p>
    </div>

    <div class="left-body">
      <div class="field">
        <div class="field-label"><span class="num">1</span> Category</div>
        <div class="chips" id="categoryChips"></div>
      </div>

      <div class="field">
        <div class="field-label"><span class="num">2</span> Video Context</div>
        <textarea id="videoContext" placeholder="영상에 대한 설명을 입력하세요..."></textarea>
      </div>

      <div class="field">
        <div class="field-label"><span class="num">3</span> Editing Direction</div>
        <textarea id="editingDirection" placeholder="원하는 편집 방향을 입력하세요..."></textarea>
      </div>
    </div>

    <div class="left-footer">
      <button class="submit-btn" id="submitBtn">입력</button>
    </div>
  </section>

  <!-- ============ RIGHT: OUTPUT ============ -->
  <section class="right">
    <div class="right-header">
      <h2>모델 출력 · 편집 가이드라인</h2>
      <span class="badge" id="doneBadge"><span class="dot"></span> 생성 완료</span>
    </div>
    <div class="right-body" id="resultArea">
      <div class="placeholder" id="placeholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 5h16M4 12h10M4 19h7" stroke-linecap="round"/>
        </svg>
        <div>왼쪽에서 입력 후 <b>"입력"</b> 버튼을 누르면<br>편집 가이드라인이 여기에 표시됩니다.</div>
      </div>
    </div>
  </section>
</div>

<script>
  const CATEGORIES = ["cooking","job","sketch","talk","baseball","basketball",
    "football","action","animation","romance","review","vlog","knowledge","lecture"];

  // ----- Pre-generated output (sample_001_cooking_a.txt) -----
  const RESULT = `[Category]
cooking

[Video Context]
요리 예능 프로그램 영상으로, 4명의 출연자가 스튜디오 주방에서 한 메뉴를 완성해가는 과정을 보여줍니다. 메인 호스트 1명이 진행하며, 셰프 1명이 요리를 준비하고, 게스트 2명이 맛과 비주얼에 대해 실시간으로 반응합니다. 초기에는 재료 소개와 조리 순서 설명으로 시작하지만, 중간에 강한 불 조절이나 독특한 재료 조합으로 출연진의 놀람과 웃음이 증가합니다. 완성된 음식을 함께 맛보며 표정 변화와 짧은 감탄, 상호 코멘트가 이어집니다. 촬영 장면은 재료 손질, 조리, 플레이팅, 시식, 대화, 웃음 반응으로 구성됩니다. 전체 분위기는 밝고 유쾌하며, 음식 결과 출연자들의 반응이 한 장면 안에서 자연스럽게 표현됩니다.

[Dominant Modality]
시각 + 오디오. 시각적으로는 음식과 출연자들의 반응이 같은 화면에서 안정적으로 보이는 장면을 중심으로 하며, 오디오에서는 웃음과 감탄이 나오는 순간을 포착합니다. semantic_change와 visual_dynamics가 주요 신호로 작용하며, text_based와 modality_attn은 보조적입니다.

[Visual Guide]
- 조건: 완성된 음식과 출연자들의 표정이 한 장면 안에서 자연스럽게 연결되는 구간을 우선 선택합니다.
- 편집 액션: 완성 직전의 플레이팅 단계에서 음식의 형태와 색상이 강조된 close-up 샷을 사용합니다. 출연자들이 웃음하거나 감탄할 때 해당 반응을 포착한 화면을 유지하며, 같은 화면 내에서 대화와 반응이 이어지는 장면을 연결합니다. 빠른 컷보다는 동일 장면 내에서 반응이 축적되는 흐름을 유지합니다. 예를 들어, 셰프가 독특한 재료를 사용할 때 출연자들의 반응을 포착한 화면을 여러 번 반복해 보여주거나, 웃음 소리가 지속되는 구간을 확대합니다.
- 근거: cooking 분석에서 시각적 안정성과 출연자 반응의 연결성이 강조되므로, 이러한 장면 선택이 시각적 우선순위에 해당합니다.

[Text Guide]
- 조건: 화면 텍스트는 음식 이름과 주요 반응 키워드만 표시합니다.
- 편집 액션: 음식 준비 단계에서는 메뉴명을 강조한 텍스트를 보여주고, 완성된 음식을 맛보는 장면에서는 "맛있어요!" 또는 "놀랍습니다" 같은 키워드를 짧게 표시합니다. 긴 설명은 피합니다. 텍스트 위치는 출연자들의 눈 아래로 위치해 시각적 방해 요소가 되지 않도록 합니다.
- 근거: text_based 분석에서 자막 밀도가 핵심이 아니므로, 정보 전달에 필요한 최소한의 텍스트만 사용합니다.

[Audio Guide]
- 조건: 출연자들의 웃음과 감탄이 나오는 구간을 우선 캡처합니다.
- 편집 액션: 웃음 소리가 발생하는 순간을 정확히 잡기 위해 오디오를 미세하게 조정합니다. 특히 중간에 예상치 못한 재료 조합이 등장할 때의 반응을 강조하기 위해 해당 구간의 오디오를 확대합니다. 배경 음악은 출연자들의 대화와 웃음이 잘 들리도록 볼륨을 조절합니다.
- 근거: reaction_cue가 cooking의 핵심 신호이므로, 이러한 오디오 반응을 포착하는 편집이 중요합니다.

[Priority Guide]
1. 완성된 음식과 출연자들의 즉각적인 반응이 같은 화면에서 표현되는 장면을 먼저 편집합니다.
2. 웃음과 감탄이 지속되는 구간을 연결하여 자연스러운 흐름을 유지합니다.
3. 빠른 컷 대신 동일 장면 내에서 반응이 축적되는 과정을 우선적으로 편집합니다.

[Summary]
cooking 영상 편집은 음식의 완성 과정과 출연자들의 실시간 반응을 하나의 장면에서 자연스럽게 연결하는 것이 핵심입니다. 시각적으로는 안정적인 화면 구성과 반응 표현을, 오디오적으로는 웃음과 감탄을 포착하여 시청자에게 흥미를 유발하는 편집이 필요합니다. 최소한의 텍스트 사용과 부드러운 장면 전환으로 밝고 유쾌한 분위기를 유지합니다.`;

  // ---------- Build category chips (cooking pre-selected) ----------
  const chipsEl = document.getElementById("categoryChips");
  let selectedCategory = "cooking";
  CATEGORIES.forEach(cat => {
    const chip = document.createElement("div");
    chip.className = "chip" + (cat === selectedCategory ? " active" : "");
    chip.textContent = cat;
    chip.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      selectedCategory = cat;
    });
    chipsEl.appendChild(chip);
  });
  // Video Context & Editing Direction start empty (no pre-fill)

  // ---------- Parse RESULT into a section map ----------
  function parseSections(text) {
    const map = {};
    text.split(/\n(?=\[)/).forEach(block => {
      const m = block.match(/^\[([^\]]+)\]\s*([\s\S]*)$/);
      if (m) map[m[1].trim()] = m[2].trim();
    });
    return map;
  }

  // split a guide block into {조건, 편집 액션, 근거}
  function parseGuide(content) {
    const rows = [];
    content.split(/\n-\s*/).forEach(seg => {
      const s = seg.replace(/^-\s*/, "").trim();
      if (!s) return;
      const idx = s.indexOf(":");
      if (idx === -1) { rows.push(["", s]); return; }
      rows.push([s.slice(0, idx).trim(), s.slice(idx + 1).trim()]);
    });
    return rows;
  }

  function guideRowClass(label) {
    if (label.includes("조건")) return "cond";
    if (label.includes("액션")) return "act";
    if (label.includes("근거")) return "why";
    return "";
  }

  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  // ---------- Render polished cards ----------
  function renderResult(text) {
    const S = parseSections(text);
    const root = el("div", "result fade-in");

    // Title + category
    const title = el("div", "res-title");
    title.appendChild(el("h1", null, "편집 가이드라인"));
    title.appendChild(el("span", "cat", "카테고리 · " + (S["Category"] || selectedCategory)));
    root.appendChild(title);

    // Summary highlight box (핵심 전략 요약)
    if (S["Summary"]) {
      const c = el("div", "card highlight");
      c.appendChild(el("div", "card-title", '<span class="tick g">✓</span> 핵심 전략 요약'));
      c.appendChild(el("div", "quote", esc(S["Summary"])));
      root.appendChild(c);
    }

    // Meta row: video context + dominant modality
    const meta = el("div", "meta-row");
    if (S["Dominant Modality"]) {
      const mod = S["Dominant Modality"].split(".")[0];
      meta.appendChild(el("div", "pill", '<span class="k">Dominant Modality</span><span class="v">' + esc(mod) + '</span>'));
    }
    if (meta.children.length) root.appendChild(meta);

    // Video Context card
    if (S["Video Context"]) {
      const c = el("div", "card");
      c.appendChild(el("div", "card-title", '<span class="tick b">i</span> 영상 컨텍스트'));
      c.appendChild(el("div", "para", esc(S["Video Context"])));
      root.appendChild(c);
    }

    // Group header
    root.appendChild(el("div", "group-head", "세부 가이드라인"));

    // Guide cards
    const guides = [
      ["Visual Guide", "시각 가이드", "visual"],
      ["Text Guide",   "텍스트 가이드", "text"],
      ["Audio Guide",  "오디오 가이드", "audio"],
    ];
    guides.forEach(([key, label, cls]) => {
      if (!S[key]) return;
      const c = el("div", "card guide " + cls);
      c.appendChild(el("div", "card-title", label + ' <span style="color:var(--muted);font-weight:500;font-size:12px">' + key + '</span>'));
      parseGuide(S[key]).forEach(([k, v]) => {
        const row = el("div", "guide-row " + guideRowClass(k));
        if (k) row.appendChild(el("div", "label", esc(k)));
        row.appendChild(el("div", "val", esc(v)));
        c.appendChild(row);
      });
      root.appendChild(c);
    });

    // Priority list
    if (S["Priority Guide"]) {
      const c = el("div", "card");
      c.appendChild(el("div", "card-title", '<span class="tick b">★</span> 우선순위 가이드'));
      const ul = el("ul", "plist");
      S["Priority Guide"].split(/\n/).forEach(line => {
        const t = line.replace(/^\s*\d+[.)]\s*/, "").trim();
        if (t) ul.appendChild(el("li", null, esc(t)));
      });
      c.appendChild(ul);
      root.appendChild(c);
    }

    const area = document.getElementById("resultArea");
    area.innerHTML = "";
    area.appendChild(root);
  }

  // ---------- Submit ----------
  const btn = document.getElementById("submitBtn");
  btn.addEventListener("click", () => {
    btn.disabled = true;
    btn.textContent = "생성 중...";
    document.getElementById("doneBadge").classList.remove("show");
    document.getElementById("resultArea").innerHTML =
      '<div class="placeholder"><div>편집 가이드라인을 생성하고 있습니다...</div></div>';

    setTimeout(() => {
      renderResult(RESULT);
      document.getElementById("doneBadge").classList.add("show");
      btn.disabled = false;
      btn.textContent = "입력";
    }, 650);
  });
</script>
</body>
