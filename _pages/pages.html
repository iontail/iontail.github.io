---
layout: single
title: "Pages"
permalink: /pages/
page_class: projects-page
author_profile: false
---

<div class="project-page-list">
  {% for project in site.data.project_pages %}
    <a class="project-card project-card--link" href="{{ project.url }}">
      <span class="project-card__gooey" aria-hidden="true"></span>
      {% if project.image %}
        <img src="{{ project.image }}" alt="{{ project.short_title }} preview" class="project-card__image">
      {% endif %}
      <span class="project-card__text">
        <h2>{{ project.title }}</h2>
        <p>{{ project.description }}</p>
      </span>
    </a>
  {% endfor %}
</div>

<script>
  document.querySelectorAll(".project-card--link").forEach((card) => {
    card.addEventListener("mousemove", (event) => {
      const rect = card.getBoundingClientRect();
      card.style.setProperty("--x", `${event.clientX - rect.left}px`);
      card.style.setProperty("--y", `${event.clientY - rect.top}px`);
      card.style.setProperty("--height", `${rect.height}px`);
      card.style.setProperty("--width", `${rect.width}px`);
    });
  });
</script>
